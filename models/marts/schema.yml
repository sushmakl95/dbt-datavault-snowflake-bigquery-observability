version: 2

models:
  - name: dim_customers
    description: Customer dimension (Type-1, latest-state) sourced from PIT.
    columns:
      - name: hk_customer
        tests: [not_null, unique]

  - name: dim_products
    description: Product dimension (latest-state).
    columns:
      - name: hk_product
        tests: [not_null, unique]

  - name: dim_date
    description: Compact conformed date dimension.
    columns:
      - name: ds
        tests: [not_null, unique]

  - name: fct_orders_daily
    description: Daily fact grain — orders, GMV, units by country/currency/status.
    columns:
      - name: ds
        tests: [not_null]
      - name: gmv
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: orders
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [ds, country, currency, status]
