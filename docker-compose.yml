services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dbt
      POSTGRES_PASSWORD: dbt
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"

  superset:
    image: apache/superset:3.1.1
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: dev-only-0123456789abcdef
      ADMIN_PASSWORD: admin
    command: >
      bash -c "
      pip install psycopg2-binary duckdb-engine &&
      superset db upgrade &&
      superset fab create-admin --username admin --firstname A --lastname B --email a@b.io --password admin || true &&
      superset init &&
      /usr/bin/run-server.sh"
    depends_on:
      - postgres

  elementary:
    image: elementarydata/edr:latest
    profiles: ["elementary"]
    environment:
      DBT_PROFILES_DIR: /app/profiles
    volumes:
      - ./:/app
      - ./profiles:/app/profiles

  airflow:
    image: apache/airflow:2.8.3-python3.11
    profiles: ["airflow"]
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dbt:dbt@postgres:5432/analytics
      _PIP_ADDITIONAL_REQUIREMENTS: "dbt-postgres==1.8.2 dbt-duckdb==1.8.3"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/dbt
    depends_on:
      - postgres
    command: standalone
